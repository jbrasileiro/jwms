name: Package JWMS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  dist:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build application image (jpackage)
        shell: bash
        run: |
          chmod +x mvnw
          ./mvnw -B -Pdist -pl jwms-frontend -am package

      - uses: actions/upload-artifact@v4
        with:
          name: jwms-${{ matrix.os }}
          path: jwms-frontend/target/jpackage-app/
